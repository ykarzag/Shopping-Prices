name: scrape-prices

on:
  workflow_dispatch: {}   # manual run button
  schedule:
    - cron: "0 4 * * *"   # daily ~07:00 Israel time

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Run scraper
        env:
          # publishedprices.co.il serves an incomplete cert chain that Node rejects.
          # This scraper only downloads PUBLIC price data, so relaxing TLS is acceptable.
          NODE_TLS_REJECT_UNAUTHORIZED: "0"
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: node scrape.mjs
      - name: Commit result.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add result.json
          git commit -m "update scrape result [skip ci]" || echo "no changes"
          git push
