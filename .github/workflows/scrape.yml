name: scrape-prices

on:
  workflow_dispatch: {}   # manual run button
  # schedule:
  #   - cron: "0 4 * * *"  # daily 04:00 UTC (enable later)

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Run scraper
        run: node scrape.mjs
